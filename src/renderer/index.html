<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Tagger</title>
    <style>
        /* Base styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #1E1E1E;
            color: #E0E0E0;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Card styling */
        .card {
            background-color: #2D2D2D;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

            .card h2 {
                margin-top: 0;
                margin-bottom: 15px;
                color: #3A7BDB;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
            }

        /* Progress bar */
        .progress-container {
            background-color: #3A3A3A;
            border-radius: 5px;
            height: 20px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #3A7BDB;
            transition: width 0.5s ease-in-out;
        }

        /* Status messages */
        .status-message {
            margin-top: 10px;
            font-size: 14px;
            color: #B0B0B0;
        }

        /* Error notification */
        .error-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #F44336;
            color: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
        }

            .error-notification h3 {
                margin-top: 0;
                margin-bottom: 10px;
            }

            .error-notification .close-notification {
                background: none;
                border: 1px solid white;
                color: white;
                padding: 5px 10px;
                border-radius: 3px;
                cursor: pointer;
            }

        /* Buttons */
        .btn {
            background-color: #3A7BDB;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

            .btn:hover {
                background-color: #4A8AEC;
            }

            .btn:disabled {
                background-color: #555;
                cursor: not-allowed;
            }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Audiobook Tagger</h1>
        </header>

        <!-- Filesystem Scanning Section -->
        <div class="card">
            <h2>Filesystem Scanner</h2>

            <div class="input-group">
                <input type="text" id="directory-path" placeholder="Select directory" readonly>
                <button id="browse-btn" class="btn">Browse</button>
                <button id="scan-btn" class="btn" disabled>Scan Directory</button>
            </div>

            <div class="progress-container">
                <div id="filesystem-progress-bar" class="progress-bar"></div>
            </div>

            <div id="filesystem-status" class="status-message"></div>
        </div>

        <!-- File Processing Section -->
        <div class="card">
            <h2>File Processing</h2>

            <button id="process-btn" class="btn" disabled>Process Files</button>

            <div class="progress-container">
                <div id="processing-progress-bar" class="progress-bar"></div>
            </div>

            <div id="processing-status" class="status-message"></div>

            <div id="processing-summary"></div>
        </div>

        <!-- Metadata Search Section -->
        <div class="card">
            <h2>Metadata Search</h2>

            <div class="input-group">
                <input type="text" id="metadata-search-input" placeholder="Search book title or author">
                <button id="metadata-search-btn" class="btn">Search</button>
            </div>

            <div id="metadata-search-status" class="status-message"></div>

            <div id="metadata-results"></div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
