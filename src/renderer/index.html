<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Tagger</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #1E1E1E;
            color: #E0E0E0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        h1 {
            margin: 0;
            font-size: 24px;
        }

        .version {
            font-size: 12px;
            color: #999;
        }

        .card {
            background-color: #2D2D2D;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

            .card h2 {
                margin-top: 0;
                margin-bottom: 15px;
                font-size: 18px;
            }

        input, button {
            background-color: #3A3A3A;
            border: 1px solid #555;
            color: #E0E0E0;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
        }

        input {
            width: 300px;
            margin-right: 10px;
        }

        button {
            cursor: pointer;
            transition: background-color 0.2s;
        }

            button:hover {
                background-color: #4A4A4A;
            }

            button:active {
                background-color: #3A7BDB;
            }

        .input-group {
            display: flex;
            margin-bottom: 10px;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
        }

        .error {
            color: #F44336;
        }

        .success {
            color: #4CAF50;
        }

        .warning {
            color: #FFC107;
        }

        #result {
            margin-top: 20px;
            overflow: auto;
            max-height: 400px;
        }

        pre {
            background-color: #252525;
            padding: 10px;
            border-radius: 4px;
            overflow: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
        }

        .metadata-card {
            display: flex;
            margin-bottom: 20px;
            background-color: #2D2D2D;
            border-radius: 6px;
            overflow: hidden;
        }

        .cover-container {
            width: 150px;
            min-width: 150px;
            height: 150px;
            background-color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .cover-container img {
                max-width: 100%;
                max-height: 100%;
            }

        .metadata-content {
            padding: 15px;
            flex-grow: 1;
        }

        .metadata-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 5px 0;
        }

        .metadata-author {
            font-size: 14px;
            margin: 0 0 10px 0;
        }

        .metadata-info {
            font-size: 13px;
            color: #B0B0B0;
            display: flex;
            flex-wrap: wrap;
        }

            .metadata-info div {
                margin-right: 15px;
                margin-bottom: 5px;
            }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Audiobook Tagger</h1>
            <div class="version">v<span id="app-version">0.1.0</span></div>
        </header>

        <div class="card">
            <h2>API Test</h2>
            <div class="input-group">
                <input type="text"
                       id="asin-input"
                       placeholder="Enter ASIN (e.g., B0BCKSQ2CK)"
                       value="B0BCKSQ2CK">
                <button id="lookup-btn">Lookup</button>
            </div>
            <div class="status" id="status-message"></div>

            <div id="result-container" style="display: none;">
                <div id="metadata-display"></div>
                <div id="result"></div>
            </div>
        </div>
    </div>

    <script>// When document is loaded
    document.addEventListener('DOMContentLoaded', () => {
      // Display app version
      document.getElementById('app-version').textContent = window.appInfo.version;

      // Setup event listeners
      const asinInput = document.getElementById('asin-input');
      const lookupBtn = document.getElementById('lookup-btn');
      const statusMessage = document.getElementById('status-message');
      const resultContainer = document.getElementById('result-container');
      const resultDisplay = document.getElementById('result');
      const metadataDisplay = document.getElementById('metadata-display');

      // Handle lookup button click
      lookupBtn.addEventListener('click', async () => {
        const asin = asinInput.value.trim();
        if (!asin) {
          displayStatus('Please enter an ASIN', 'error');
          return;
        }

        // Clear previous results
        resultDisplay.innerHTML = '';
        metadataDisplay.innerHTML = '';
        resultContainer.style.display = 'none';

        // Show loading status
        displayStatus('Looking up metadata...', 'warning');

        try {
          // Call the API through the preload bridge
          const response = await window.api.invoke('metadata:lookup-async', { asin });

          if (!response.success) {
            throw new Error(response.error?.message || 'Failed to lookup metadata');
          }

          // Display the result
          displayStatus('Metadata retrieved successfully', 'success');
          resultContainer.style.display = 'block';

          // Display formatted metadata
          displayMetadata(response.result);

          // Also show the raw data
          resultDisplay.innerHTML = `<pre>${JSON.stringify(response.result, null, 2)}</pre>`;
        } catch (error) {
          displayStatus(`Error: ${error.message}`, 'error');
          console.error('Lookup error:', error);
        }
      });

      // Function to display status messages
      function displayStatus(message, type = '') {
        statusMessage.textContent = message;
        statusMessage.className = 'status';
        if (type) {
          statusMessage.classList.add(type);
        }
      }

      // Function to display formatted metadata
      function displayMetadata(metadata) {
        if (!metadata) return;

        const html = `
          <div class="metadata-card">
            <div class="cover-container">
              ${metadata.coverUrl ?
                `<img src="${metadata.coverUrl}" alt="Cover">` :
                '<div style="color:#666;">No Cover</div>'}
            </div>
            <div class="metadata-content">
              <h3 class="metadata-title">${metadata.title || 'Unknown Title'}</h3>
              <p class="metadata-author">
                By ${formatAuthors(metadata.authors)} |
                Narrated by ${formatNarrators(metadata.narrators)}
              </p>
              <div class="metadata-info">
                ${metadata.series ?
                  `<div>Series: ${metadata.series.name} #${metadata.series.position}</div>` : ''}
                ${metadata.duration ?
                  `<div>Runtime: ${formatDuration(metadata.duration)}</div>` : ''}
                ${metadata.releaseDate ?
                  `<div>Released: ${formatDate(metadata.releaseDate)}</div>` : ''}
                ${metadata.publisherName ?
                  `<div>Publisher: ${metadata.publisherName}</div>` : ''}
                <div>ASIN: ${metadata.asin}</div>
              </div>
            </div>
          </div>
        `;

        metadataDisplay.innerHTML = html;
      }

      // Helper functions for formatting metadata
      function formatAuthors(authors) {
        if (!authors || !authors.length) return 'Unknown';
        return authors.map(a => a.name).join(', ');
      }

      function formatNarrators(narrators) {
        if (!narrators || !narrators.length) return 'Unknown';
        return narrators.map(n => n.name).join(', ');
      }

      function formatDuration(minutes) {
        const hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        return `${hours} hr${hours !== 1 ? 's' : ''} ${mins} min${mins !== 1 ? 's' : ''}`;
      }

      function formatDate(dateString) {
        try {
          const date = new Date(dateString);
          return date.toLocaleDateString(undefined, {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          });
        } catch (e) {
          return dateString;
        }
      }
    });</script>
</body>
</html>
